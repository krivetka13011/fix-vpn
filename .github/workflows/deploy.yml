name: Deploy FIX VPN

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci && npm run build
          test -f dist/index.html
          test -f dist/logo.png

      - name: Validate Cloudflare token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" | grep -q '"status":"active"'

      - name: Deploy to Cloudflare Workers
        id: wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@4.69.0 deploy --verbose 2>&1 | tee deploy.log

      - name: Upload deploy log on failure
        if: failure() && steps.wrangler.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log
          path: deploy.log

      - name: Resolve deployment URL
        id: url
        if: steps.wrangler.outcome == 'success'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' deploy.log | head -1)
          if [ -z "$URL" ]; then
            URL=$(npx wrangler@4.69.0 deployments list 2>/dev/null | grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' | head -1)
          fi
          if [ -z "$URL" ]; then
            URL="https://fix-vpn.krivetka13011.workers.dev"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Live URL: $URL"
          echo "## FIX VPN — Live URL" >> "$GITHUB_STEP_SUMMARY"
          echo "**$URL**" >> "$GITHUB_STEP_SUMMARY"

      - name: Set secrets
        if: steps.wrangler.outcome == 'success'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBAPP_URL: ${{ steps.url.outputs.url }}
        run: |
          printf '%s' "$TELEGRAM_BOT_TOKEN" | npx wrangler@4.69.0 secret put TELEGRAM_BOT_TOKEN
          printf '%s' "$WEBAPP_URL" | npx wrangler@4.69.0 secret put WEBAPP_URL

      - name: Verify deployment
        if: steps.wrangler.outcome == 'success'
        run: |
          URL="${{ steps.url.outputs.url }}"
          curl -fsS "$URL/api/health" | grep -q '"ok":true'
          test "$(curl -fsS -o /dev/null -w '%{http_code}' "$URL/")" = "200"

      - name: Configure Telegram
        if: steps.wrangler.outcome == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBAPP_URL: ${{ steps.url.outputs.url }}
        run: |
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/deleteWebhook?drop_pending_updates=true"
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"${WEBAPP_URL}/api/webhook/telegram\",\"allowed_updates\":[\"message\"]}"
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setChatMenuButton" \
            -H "Content-Type: application/json" \
            -d "{\"menu_button\":{\"type\":\"web_app\",\"text\":\"FIX VPN\",\"web_app\":{\"url\":\"${WEBAPP_URL}\"}}}"
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo" | grep -q webhook
