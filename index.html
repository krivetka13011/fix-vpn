<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta
      name="description"
      content="FIX VPN — быстрый VPN через Telegram. Подключение в один клик, белые IP, подписка в Mini App."
    />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>FIX VPN — VPN через Telegram</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300..400,0..1,0"
      rel="stylesheet"
    />
    <style>
      .public-fallback {
        box-sizing: border-box;
        max-width: 480px;
        margin: 0 auto;
        padding: 32px 20px;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #f0f0f0;
        background: #0a0a0a;
        min-height: 100vh;
        line-height: 1.5;
      }
      .public-fallback h1 {
        font-size: 1.75rem;
        margin: 0 0 12px;
      }
      .public-fallback p {
        margin: 0 0 16px;
        color: #a8a8a8;
      }
      .public-fallback a {
        color: #7eb8ff;
      }
    </style>
  </head>
  <body>
    <noscript>
      <main class="public-fallback">
        <h1>FIX VPN</h1>
        <p>
          VPN-сервис с подключением через Telegram. Откройте бота и нажмите
          «Открыть FIX VPN» для Mini App.
        </p>
        <p><a href="https://t.me/FIXVPNfast_bot">Открыть @FIXVPNfast_bot</a></p>
      </main>
    </noscript>
    <div id="root">
      <main class="public-fallback" id="public-fallback">
        <h1>FIX VPN</h1>
        <p>
          VPN через Telegram: быстрое подключение, белые IP, управление
          подпиской в Mini App.
        </p>
        <p><a href="https://t.me/FIXVPNfast_bot">Открыть бота в Telegram</a></p>
        <p style="font-size: 0.875rem">Загрузка приложения…</p>
      </main>
    </div>
    <script>
      window.addEventListener("error", function (e) {
        var r = document.getElementById("root");
        if (r && r.querySelector("#public-fallback")) return;
        if (r) {
          r.innerHTML =
            "<p style='color:#f0f0f0;font-family:system-ui;padding:16px'>Ошибка загрузки. Обновите страницу или откройте через Telegram.</p>";
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
