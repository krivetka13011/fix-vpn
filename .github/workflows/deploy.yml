name: Deploy FIX VPN

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci && npm run build
          test -f dist/index.html
          test -f dist/logo.png

      - name: Deploy Worker
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          npx wrangler deploy 2>&1 | tee deploy.log
          URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' deploy.log | head -1)
          if [ -z "$URL" ]; then
            echo "Deploy log:"
            cat deploy.log
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Live URL: $URL"
          {
            echo "## FIX VPN — Live URL"
            echo "**$URL**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBAPP_URL: ${{ steps.deploy.outputs.url }}
        run: |
          printf '%s' "$TELEGRAM_BOT_TOKEN" | npx wrangler secret put TELEGRAM_BOT_TOKEN
          printf '%s' "$WEBAPP_URL" | npx wrangler secret put WEBAPP_URL

      - name: Verify deployment
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          curl -fsS "$URL/api/health"
          test "$(curl -fsS -o /dev/null -w '%{http_code}' "$URL/")" = "200"

      - name: Configure Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBAPP_URL: ${{ steps.deploy.outputs.url }}
        run: |
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/deleteWebhook?drop_pending_updates=true"
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"${WEBAPP_URL}/api/webhook/telegram\",\"allowed_updates\":[\"message\"]}"
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setChatMenuButton" \
            -H "Content-Type: application/json" \
            -d "{\"menu_button\":{\"type\":\"web_app\",\"text\":\"FIX VPN\",\"web_app\":{\"url\":\"${WEBAPP_URL}\"}}}"
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo"
