name = "fix-vpn"
main = "worker/src/index.ts"
compatibility_date = "2025-05-27"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[kv_namespaces]]
binding = "USERS_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

[vars]
WEBAPP_URL = "https://fix-vpn.YOUR_SUBDOMAIN.workers.dev"
