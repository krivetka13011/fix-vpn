name: Deploy FIX VPN

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Apply D1 migrations
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@4.69.0 d1 migrations apply fix-vpn --remote

      - name: Install and build
        run: |
          npm ci && npm run build
          test -f dist/index.html
          test -f dist/logo.png

      - name: Validate Cloudflare token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" | grep -q '"status":"active"'

      - name: Deploy to Cloudflare Workers
        id: wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler@4.69.0 deploy 2>&1 | tee deploy.log

      - name: Attach app.fixvp.xyz custom domain
        continue-on-error: true
        id: attach_domain
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_FIXVP_ZONE_ID: ${{ secrets.CLOUDFLARE_FIXVP_ZONE_ID }}
          SPACESHIP_API_KEY: ${{ secrets.SPACESHIP_API_KEY }}
          SPACESHIP_API_SECRET: ${{ secrets.SPACESHIP_API_SECRET }}
        run: |
          pip install requests
          python scripts/attach_public_domain.py | tee attach.log
          ZONE_ID=$(grep -oE 'ZONE_ID=[a-f0-9]+' attach.log | head -1 | cut -d= -f2)
          if [ -n "$ZONE_ID" ]; then
            echo "zone_id=$ZONE_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Attach sub.fixvp.xyz custom domain
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_FIXVP_ZONE_ID: ${{ secrets.CLOUDFLARE_FIXVP_ZONE_ID }}
        run: python scripts/setup_sub_cloudflare.py

      - name: Resolve Live URL
        id: url
        run: |
          WORKERS_URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' deploy.log | head -1)
          if [ -z "$WORKERS_URL" ]; then
            cat deploy.log >&2
            exit 1
          fi
          PUBLIC_URL="${{ secrets.WEBAPP_URL }}"
          PUBLIC_URL="${PUBLIC_URL%/}"
          if [ -z "$PUBLIC_URL" ]; then
            PUBLIC_URL="https://app.fixvp.xyz"
          fi
          URL="$PUBLIC_URL"
          if curl -fsS "$URL/api/health" 2>/dev/null | grep -q '"ok":true'; then
            echo "Public URL ready: $URL"
          else
            echo "::warning::Public URL health check pending — WEBAPP_URL still $URL (not workers.dev)"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "workers_url=$WORKERS_URL" >> "$GITHUB_OUTPUT"

      - name: Set Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CLIENT_BOT_TOKEN: ${{ secrets.CLIENT_BOT_TOKEN }}
          PARTNER_BOT_TOKEN: ${{ secrets.PARTNER_BOT_TOKEN }}
          WEBAPP_URL: ${{ steps.url.outputs.url }}
          XUI_BASE_URL: ${{ secrets.XUI_BASE_URL }}
          XUI_API_TOKEN: ${{ secrets.XUI_API_TOKEN }}
          MANAGER_NOTIFICATION_CHAT_ID: ${{ secrets.MANAGER_NOTIFICATION_CHAT_ID }}
          MANAGER_TELEGRAM_IDS: ${{ secrets.MANAGER_TELEGRAM_IDS }}
        run: |
          CLIENT_TOKEN="${CLIENT_BOT_TOKEN:-$TELEGRAM_BOT_TOKEN}"
          test -n "$CLIENT_TOKEN" || (echo "Missing CLIENT_BOT_TOKEN or TELEGRAM_BOT_TOKEN" >&2; exit 1)
          put_secret() { local name="$1"; local value="$2"; if [ -n "$value" ]; then printf '%s' "$value" | npx wrangler@4.69.0 secret put "$name"; fi; }
          put_secret TELEGRAM_BOT_TOKEN "$CLIENT_TOKEN"
          put_secret CLIENT_BOT_TOKEN "$CLIENT_TOKEN"
          put_secret PARTNER_BOT_TOKEN "$PARTNER_BOT_TOKEN"
          put_secret WEBAPP_URL "$WEBAPP_URL"
          put_secret XUI_BASE_URL "${{ secrets.XUI_BASE_URL }}"
          put_secret XUI_WORKER_BASE_URL "${{ secrets.XUI_WORKER_BASE_URL }}"
          put_secret XUI_API_TOKEN "$XUI_API_TOKEN"
          put_secret XUI_INSECURE_SSL "1"
          put_secret XUI_INBOUND_IDS "19,20,21,24"
          put_secret VPN_SERVER_HOST "${{ secrets.VPN_SERVER_HOST || 'fixvp.xyz' }}"
          put_secret SUBSCRIPTION_BASE_URL "${{ secrets.SUBSCRIPTION_BASE_URL || 'https://fixvp.xyz:2096' }}"
          put_secret SUBSCRIPTION_CLIENT_BASE_URL "${{ secrets.SUBSCRIPTION_CLIENT_BASE_URL || 'https://sub.fixvp.xyz' }}"
          put_secret SUBSCRIPTION_WORKER_FETCH_URL "${{ secrets.SUBSCRIPTION_WORKER_FETCH_URL || 'https://31.76.2.248:2096' }}"
          put_secret SUBSCRIPTION_PATH "/sub"
          put_secret MANAGER_NOTIFICATION_CHAT_ID "$MANAGER_NOTIFICATION_CHAT_ID"
          put_secret MANAGER_TELEGRAM_IDS "$MANAGER_TELEGRAM_IDS"
          put_secret E2E_TRACE_SECRET "${{ secrets.E2E_TRACE_SECRET }}"
          put_secret PLATEGA_MERCHANT_ID "${{ secrets.PLATEGA_MERCHANT_ID }}"
          put_secret PLATEGA_API_SECRET "${{ secrets.PLATEGA_API_SECRET }}"
          put_secret CLIENT_BOT_USERNAME "FIXVPNfast_bot"
          put_secret PARTNER_BOT_USERNAME "FIX_Partner_bot"
          put_secret PARTNER_DEFAULT_COMMISSION_PERCENT "${{ secrets.PARTNER_DEFAULT_COMMISSION_PERCENT || '30' }}"
          put_secret HAPP_PROVIDER_ID "${{ secrets.HAPP_PROVIDER_ID }}"
          put_secret TEST_MODE "1"
          put_secret TRIAL_DURATION_MINUTES "5"
          put_secret TESTER_TRIAL_DURATION_MINUTES "60"
          put_secret TEST_CHECKOUT_PRICE_RUB "1"
          put_secret TEST_SUBSCRIPTION_MINUTES "10"
          put_secret TESTER_TELEGRAM_IDS "1159166497"
          put_secret XUI_CLIENT_LIMIT_IP "1"
          put_secret HWID_ENFORCE "true"
          npx wrangler@4.69.0 secret delete CARDLINK_API_TOKEN 2>/dev/null || true
          npx wrangler@4.69.0 secret delete CARDLINK_SHOP_ID 2>/dev/null || true

      - name: Re-deploy Worker (ensure latest code is active after secret updates)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@4.69.0 deploy 2>&1 | tail -5

      - name: Verify deployment
        run: |
          URL="${{ steps.url.outputs.url }}"
          WORKERS_URL="${{ steps.url.outputs.workers_url }}"
          EFFECTIVE_URL="$URL"
          if curl -fsS "$URL/api/health" | tee /tmp/health.json | grep -qE '"ok":(true|false)'; then
            echo "health endpoint reachable"
          elif [ -n "$WORKERS_URL" ] && curl -fsS "$WORKERS_URL/api/health" | tee /tmp/health.json | grep -qE '"ok":(true|false)'; then
            EFFECTIVE_URL="$WORKERS_URL"
            echo "::warning::Public URL not ready yet ($URL) — workers.dev OK. Add fixvp.xyz to Cloudflare."
          else
            cat /tmp/health.json >&2
            exit 1
          fi
          if grep -q '"paused":true' /tmp/health.json; then
            echo "::warning::Worker paused (WORKER_PAUSED) — deploy OK, resume when ready"
          else
            grep -q '"ok":true' /tmp/health.json
          fi
          grep -q '"clientBotOk":true' /tmp/health.json
          grep -q '"d1Ok":true' /tmp/health.json
          grep -q '"kvOk":true' /tmp/health.json
          if ! grep -q '"d1Ok":true' /tmp/health.json; then
            echo "::warning::d1Ok=false — run D1 migrations: wrangler d1 migrations apply fix-vpn --remote"
            cat /tmp/health.json
          fi
          if ! grep -q '"xuiOk":true' /tmp/health.json; then
            echo "::warning::xuiOk=false — Worker cannot reach 3X-UI panel (use fixvp.xyz hostname, not raw IP)"
            cat /tmp/health.json
          fi
          curl -fsS "$EFFECTIVE_URL/api/catalog" | grep -q '"tariffs"'
          WH_CODE=$(curl -sS -o /dev/null -w '%{http_code}' -X POST "$EFFECTIVE_URL/api/webhook/client" \
            -H "Content-Type: application/json" \
            -d '{"message":{"chat":{"id":0},"text":"/start"}}')
          test "$WH_CODE" = "200"
          test "$(curl -sS -o /dev/null -w '%{http_code}' "$EFFECTIVE_URL/")" = "200"
          echo "## FIX VPN — Live URL" >> "$GITHUB_STEP_SUMMARY"
          echo "**$URL**" >> "$GITHUB_STEP_SUMMARY"
          if [ "$EFFECTIVE_URL" != "$URL" ]; then
            echo "_(workers.dev fallback: $WORKERS_URL)_" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Configure Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CLIENT_BOT_TOKEN: ${{ secrets.CLIENT_BOT_TOKEN }}
          PARTNER_BOT_TOKEN: ${{ secrets.PARTNER_BOT_TOKEN }}
          WEBAPP_URL: ${{ steps.url.outputs.url }}
        run: |
          CLIENT_TOKEN="${CLIENT_BOT_TOKEN:-$TELEGRAM_BOT_TOKEN}"
          curl -fsS "https://api.telegram.org/bot${CLIENT_TOKEN}/getMe" | grep -q '"ok":true'
          curl -fsS "https://api.telegram.org/bot${CLIENT_TOKEN}/deleteWebhook?drop_pending_updates=true"
          curl -fsS -X POST "https://api.telegram.org/bot${CLIENT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"${WEBAPP_URL}/api/webhook/client\",\"allowed_updates\":[\"message\",\"callback_query\"]}"
          curl -fsS -X POST "https://api.telegram.org/bot${CLIENT_TOKEN}/setChatMenuButton" \
            -H "Content-Type: application/json" \
            -d "{\"menu_button\":{\"type\":\"web_app\",\"text\":\"FIX VPN\",\"web_app\":{\"url\":\"${WEBAPP_URL}\"}}}"
          if [ -n "$PARTNER_BOT_TOKEN" ]; then
            curl -fsS "https://api.telegram.org/bot${PARTNER_BOT_TOKEN}/getMe" | grep -q '"ok":true'
            curl -fsS "https://api.telegram.org/bot${PARTNER_BOT_TOKEN}/deleteWebhook?drop_pending_updates=true"
            curl -fsS -X POST "https://api.telegram.org/bot${PARTNER_BOT_TOKEN}/setWebhook" \
              -H "Content-Type: application/json" \
              -d "{\"url\":\"${WEBAPP_URL}/api/webhook/partner\",\"allowed_updates\":[\"message\",\"callback_query\"]}"
          fi
