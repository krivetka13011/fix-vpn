name: Cleanup fresh test

on:
  workflow_dispatch:
    inputs:
      db_only:
        description: "Only wipe D1 + KV (skip panel API)"
        type: boolean
        default: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Wipe D1/KV (and panel unless db_only)
        env:
          DB_ONLY: ${{ inputs.db_only && '1' || '0' }}
          PANEL_SYNC_DISABLED: "1"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          XUI_BASE_URL: ${{ secrets.XUI_BASE_URL || 'https://fixvp.xyz:54596/LXZo7cOhasXWon5uQu' }}
          XUI_API_TOKEN: ${{ secrets.XUI_API_TOKEN }}
        run: python scripts/cleanup_for_fresh_test.py
