name: Deploy FIX VPN

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci && npm run build
          test -f dist/index.html
          test -f dist/logo.png

      - name: Validate Cloudflare token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" | grep -q '"status":"active"'

      - name: Deploy to Cloudflare Workers
        id: wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler@4.69.0 deploy 2>&1 | tee deploy.log

      - name: Resolve and verify Live URL
        id: url
        run: |
          URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' deploy.log | head -1)
          if [ -z "$URL" ]; then
            echo "No workers.dev URL in deploy.log:" >&2
            cat deploy.log >&2
            exit 1
          fi
          curl -fsS "$URL/api/health" | tee /tmp/health.json | grep -q '"ok":true'
          grep -q '"botOk":true' /tmp/health.json
          curl -fsS "$URL/api/plans" | grep -q '"plans"'
          HOME=$(curl -sS -o /dev/null -w '%{http_code}' "$URL/")
          test "$HOME" = "200"
          WH_CODE=$(curl -sS -o /dev/null -w '%{http_code}' -X POST "$URL/api/webhook/telegram" \
            -H "Content-Type: application/json" \
            -d '{"message":{"chat":{"id":0},"text":"/start"}}')
          test "$WH_CODE" = "200"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "## FIX VPN — Live URL" >> "$GITHUB_STEP_SUMMARY"
          echo "**$URL**" >> "$GITHUB_STEP_SUMMARY"
          echo "BotFather → Configure Mini App → этот URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Set Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBAPP_URL: ${{ steps.url.outputs.url }}
        run: |
          printf '%s' "$TELEGRAM_BOT_TOKEN" | npx wrangler@4.69.0 secret put TELEGRAM_BOT_TOKEN
          printf '%s' "$WEBAPP_URL" | npx wrangler@4.69.0 secret put WEBAPP_URL

      - name: Configure Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBAPP_URL: ${{ steps.url.outputs.url }}
        run: |
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe" | grep -q '"ok":true'
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/deleteWebhook?drop_pending_updates=true"
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"${WEBAPP_URL}/api/webhook/telegram\",\"allowed_updates\":[\"message\"]}"
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setChatMenuButton" \
            -H "Content-Type: application/json" \
            -d "{\"menu_button\":{\"type\":\"web_app\",\"text\":\"FIX VPN\",\"web_app\":{\"url\":\"${WEBAPP_URL}\"}}}"
          WH=$(curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo")
          echo "$WH" | grep -q "${WEBAPP_URL}/api/webhook/telegram"
          curl -fsS -X POST "${WEBAPP_URL}/api/webhook/telegram" \
            -H "Content-Type: application/json" \
            -d '{"message":{"chat":{"id":0},"text":"/start"}}' | grep -q '^ok'
