name: Sync panel clients

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests urllib3

      - name: Sync Supabase subscriptions to 3X-UI panel
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          XUI_BASE_URL: ${{ secrets.XUI_BASE_URL || 'https://fixvp.xyz:54596/LXZo7cOhasXWon5uQu' }}
          XUI_API_TOKEN: ${{ secrets.XUI_API_TOKEN }}
          SUBSCRIPTION_BASE_URL: ${{ secrets.SUBSCRIPTION_BASE_URL || 'https://fixvp.xyz:2096' }}
          SUBSCRIPTION_CLIENT_BASE_URL: ${{ secrets.SUBSCRIPTION_CLIENT_BASE_URL || 'https://31.76.2.248:2096' }}
          SUBSCRIPTION_PATH: /sub
          WEBAPP_URL: ${{ secrets.WEBAPP_URL || 'https://fix-vpn.krivetkagames.workers.dev' }}
        run: python scripts/sync_panel_from_db.py
